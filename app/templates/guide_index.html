<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Japanese ramen guides (EN/KO) — styles, ordering, regions | OKRamen</title>
    <meta name="description" content="Every OKRamen guide in one place: shio, shoyu, miso, tonkotsu, mazemen, regional picks, and trip-ready ordering tips. Open an article, then jump to the map.">
    <meta name="robots" content="index,follow,max-image-preview:large">
    <link rel="canonical" href="{{ site_url }}/guide" />
    <link rel="alternate" hreflang="en" href="{{ site_url }}/guide" />
    <link rel="alternate" hreflang="ko" href="{{ site_url }}/guide?lang=ko" />
    <link rel="alternate" hreflang="x-default" href="{{ site_url }}/guide" />
    <meta property="og:type" content="website">
    <meta property="og:title" content="OKRamen guides — full list (English & Korean)">
    <meta property="og:description" content="Skim every ramen deep-dive: styles, noodles, chashu, eggs, and where to eat—built to pair with the OKRamen Japan map.">
    <meta property="og:url" content="{{ site_url }}/guide">
    <meta property="og:site_name" content="OKRamen">
    <meta property="og:image" content="{{ site_url }}/static/images/logo.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="OKRamen — all ramen guides (EN/KO)">
    <meta name="twitter:description" content="Style explainers + travel tips; tap a guide, then use the map to route your ramen crawl.">
    <meta name="twitter:image" content="{{ site_url }}/static/images/logo.png">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    {% include 'header.html' %}

    <div class="content-wrapper" style="margin-top: 40px;">
        <h2 class="list-title" style="text-align: center;">📖 All Japanese Ramen Guides</h2>
        
        <!-- 💡 중앙 언어 선택 버튼 삭제됨 -->

        <div class="onsen-grid">
            {% for guide in guides.get(lang, []) %}
            <a href="/guide/{{ guide.id }}" class="onsen-card">
                <img src="{{ guide.thumbnail }}" alt="{{ guide.title }}" class="card-thumb">
                <div class="card-content">
                    <h3 class="card-title">{{ guide.title }}</h3>
                    <p class="card-summary">{{ guide.summary }}</p>
                </div>
            </a>
            {% endfor %}
        </div>

        <div style="text-align: center; margin-top: 50px;">
            <a href="/" class="back-btn">🗺️ Back to Map</a>
        </div>
    </div>
    {% include 'footer.html' %}
</body>
</html>
