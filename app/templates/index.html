<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 파비콘 설정 (경로를 favicon.ico로 통일 추천) -->

    <link rel="icon" href="/static/images/favicon.ico" type="image/x-icon">
    
    <title>OKRamen - Japan Guide</title>
    <link rel="stylesheet" href="/static/css/style.css">

<body>
    <header>
        <div class="container">
            <h1><a href="/"><img src="/static/images/logo.png" alt="OKRamen" class="logo-img"></a></h1>
            <div class="status-bar">
                <div class="status-badge">🍜 <span id="total-ramens">0</span> Shops</div>
                <div class="status-badge">📅 <span id="last-updated-date">-</span></div>
            </div>
            <div class="lang-selector">
                <button class="lang-btn active" data-lang="en">English</button>
                <button class="lang-btn" data-lang="ko">한국어</button>
            </div>
            <div class="theme-filter-buttons" data-group="flavor">
                <button class="theme-button active" data-theme="all">
                    All <span class="count-badge" id="count-all">0</span>
                </button>
                <button class="theme-button" data-theme="tonkotsu">
                    🐷 Tonkotsu <span class="count-badge" id="count-tonkotsu">0</span>
                </button>
                <button class="theme-button" data-theme="shoyu">
                    🥣 Shoyu <span class="count-badge" id="count-shoyu">0</span>
                </button>
                <button class="theme-button" data-theme="miso">
                    🍲 Miso <span class="count-badge" id="count-miso">0</span>
                </button>
                <button class="theme-button" data-theme="shio">
                    🧂 Shio <span class="count-badge" id="count-shio">0</span>
                </button>
                <button class="theme-button" data-theme="chicken">
                    🐔 Chicken <span class="count-badge" id="count-chicken">0</span>
                </button>
                <button class="theme-button" data-theme="tsukemen">
                    🥢 Tsukemen <span class="count-badge" id="count-tsukemen">0</span>
                </button>
                <button class="theme-button" data-theme="vegan">
                    🥬 Vegan <span class="count-badge" id="count-vegan">0</span>
                </button>
            </div>
        </div>
    </header>

    <div id="map" style="width: 100%; height: 500px;"></div>

    <div class="content-wrapper">
        <div id="ramen-list" class="onsen-grid"></div>
    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
