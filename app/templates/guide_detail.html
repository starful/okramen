<!DOCTYPE html>
<html lang="{{ post.lang if post.lang else 'en' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ post.seo_title }}</title>
    <meta name="description" content="{{ post.seo_description }}">
    <meta name="robots" content="index,follow,max-image-preview:large">
    <link rel="canonical" href="{{ site_url }}/guide/{{ post.id }}" />
    {% if post.lang == 'en' %}
    <link rel="alternate" hreflang="ko" href="{{ site_url }}/guide/{{ post.id | replace('_en', '_ko') }}" />
    {% else %}
    <link rel="alternate" hreflang="en" href="{{ site_url }}/guide/{{ post.id | replace('_ko', '_en') }}" />
    {% endif %}
    <link rel="alternate" hreflang="x-default" href="{{ site_url }}/guide/{{ post.id }}" />
    <link rel="stylesheet" href="/static/css/style.css">
    
    <!-- SEO: Article Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Article",
      "headline": "{{ post.title }}",
      "image": "{{ post.thumbnail if post.thumbnail.startswith('http') else site_url ~ post.thumbnail }}",
      "datePublished": "{{ post.date }}",
      "description": "{{ post.summary }}",
      "publisher": {
        "@type": "Organization",
        "name": "OKRamen",
        "logo": {"@type": "ImageObject", "url": "{{ site_url }}/static/images/logo.png"}
      }
    }
    </script>
    <meta property="og:type" content="article">
    <meta property="og:title" content="{{ post.seo_title }}">
    <meta property="og:description" content="{{ post.seo_description }}">
    <meta property="og:image" content="{{ post.thumbnail if post.thumbnail.startswith('http') else site_url ~ post.thumbnail }}">
    <meta property="og:url" content="{{ site_url }}/guide/{{ post.id }}">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ post.seo_title }}">
    <meta name="twitter:description" content="{{ post.seo_description }}">
    <meta name="twitter:image" content="{{ post.thumbnail if post.thumbnail.startswith('http') else site_url ~ post.thumbnail }}">
</head>
<body>
    {% include 'header.html' %}

    <article class="detail-container">
        <div class="detail-header">
            <h1 class="detail-title">{{ post.title }}</h1>
            <p style="color:#888;">📅 {{ post.date }}</p>
        </div>

        <img src="{{ post.thumbnail }}" alt="{{ post.title }}" class="detail-img">

        <div class="detail-content">
            {{ content | safe }}
        </div>
        
        <!-- 읽고 나서 맵으로 유도 -->
        <div style="text-align: center; margin-top: 50px; padding: 30px; background: var(--bg-color); border-radius: 15px;">
            <h3>Hungry? Find Ramen near you!</h3>
            <a href="/" class="back-btn">🗺️ Explore Ramen Map</a>
        </div>
    </article>
    {% include 'footer.html' %}
</body>
</html>
